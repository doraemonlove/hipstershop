apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: currencyservice
spec:
  serviceName: currencyservice
  selector:
    matchLabels:
      app: currencyservice
      version: "1"
  replicas: 3
  template:
    metadata:
      labels:
        app: currencyservice
        version: "1"
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: server
        image: "{{- if .Values.images.repository -}}{{ .Values.images.repository }}/{{- end }}{{ .Values.currencyService.name }}:{{ .Values.images.tag }}"
        imagePullPolicy: Always
        ports:
        - name: grpc
          containerPort: 7000
        env:
        # - name: DISABLE_STATS
        #   value: "1"
        # - name: DISABLE_TRACING
        #   value: "1"
        - name: PORT
          value: "7000"
        - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318/v1/traces"
        - name: SERVICE_NAME
          value: "currencyservice"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        #readinessProbe:
        #  exec:
        #    command: ["/bin/grpc_health_probe", "-addr=:7000"]
        #livenessProbe:
        #  exec:
        #    command: ["/bin/grpc_health_probe", "-addr=:7000"]
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 400m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: currencyservice
spec:
  type: ClusterIP
  selector:
    app: currencyservice
    version: "1"
  ports:
  - name: grpc
    port: 7000
    targetPort: 7000
