apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: productcatalogservice
spec:
  serviceName: productcatalogservice
  selector:
    matchLabels:
      app: productcatalogservice
      version: "1"
  replicas: 3
  template:
    metadata:
      labels:
        app: productcatalogservice
        version: "1"
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: server
        image: "{{- if .Values.images.repository -}}{{ .Values.images.repository }}/{{- end }}{{ .Values.productCatalogService.name }}:{{ .Values.images.tag }}"
        imagePullPolicy: Always
        ports:
        - containerPort: 3550
        env:
        - name: PORT
          value: "3550"
        - name: DISABLE_PROFILER
          value: "1"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector-opentelemetry-collector.observability.svc.cluster.local:4317"
        - name: SERVICE_NAME
          value: "productcatalogservice"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: MYSQL_ADDR
          value: "basic-tidb.tidb.svc.cluster.local:4000"
        - name: SQL_USER
          value: "root"
        - name: SQL_PASSWORD
          value: "Bizseer@2020"
        - name: ConnMaxLifeTime
          value: "100"
        - name: mySQLmaxIdleConns
          value: "10"
        #readinessProbe:
        #  exec:
        #    command: ["/bin/grpc_health_probe", "-addr=:3550"]
        #livenessProbe:
        #  exec:
        #    command: ["/bin/grpc_health_probe", "-addr=:3550"]
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 400m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
spec:
  type: ClusterIP
  selector:
    app: productcatalogservice
    version: "1"
  ports:
  - name: grpc
    port: 3550
    targetPort: 3550
