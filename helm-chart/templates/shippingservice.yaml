apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shippingservice
  
spec:
  serviceName: shippingservice
  selector:
    matchLabels:
      app: shippingservice
      version: "1"
  replicas: 3
  template:
    metadata:
      labels:
        app: shippingservice
        version: "1"
    spec:
      containers:
      - name: server
        image: "{{- if .Values.images.repository -}}{{ .Values.images.repository }}/{{- end }}{{ .Values.shippingService.name }}:{{ .Values.images.tag }}"
        imagePullPolicy: Always
        ports:
        - containerPort: 50051
        env:
        - name: PORT
          value: "50051"
        #- name: DISABLE_STATS
        #  value: "1"
        # - name: DISABLE_TRACING
        #   value: "1"
        - name: DISABLE_PROFILER
          value: "1"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector-opentelemetry-collector.observability.svc.cluster.local:4317"
        - name: SERVICE_NAME
          value: "shippingservice"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        #readinessProbe:
        #  periodSeconds: 5
        #  exec:
        #    command: ["/bin/grpc_health_probe", "-addr=:50051"]
        #livenessProbe:
        #  exec:
        #    command: ["/bin/grpc_health_probe", "-addr=:50051"]
        resources:
          requests:
            cpu: 200m
            memory: 128Mi
          limits:
            cpu: 400m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: shippingservice
  
spec:
  type: ClusterIP
  selector:
    app: shippingservice
    version: "1"
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
